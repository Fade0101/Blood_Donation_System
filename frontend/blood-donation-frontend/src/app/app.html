<app-navbar></app-navbar>

<router-outlet></router-outlet>

@if (ui.campaignModal()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">

      <!-- HEADER -->
      <div class="bg-red-600 p-5 text-white flex justify-between items-center">
        <h2 class="text-xl font-bold">إضافة حملة</h2>
        <button (click)="ui.closeCampaignModal()">✕</button>
      </div>

      <!-- BODY (IMPORTANT) -->
      <form class="p-6 space-y-4">

        <input
          type="number"
          placeholder="رقم الحملة"
          class="w-full p-3 border rounded-xl"
        />

        <input
          type="text"
          placeholder="اسم بنك الدم"
          class="w-full p-3 border rounded-xl"
        />

        <input
          type="text"
          placeholder="المشرف"
          class="w-full p-3 border rounded-xl"
        />

        <div class="grid grid-cols-2 gap-3">
          <input type="date" class="p-3 border rounded-xl" />
          <input type="date" class="p-3 border rounded-xl" />
        </div>

        <div class="flex justify-end gap-3">

          <button
            type="button"
            (click)="ui.closeCampaignModal()"
            class="px-4 py-2 bg-gray-200 rounded-xl"
          >
            إلغاء
          </button>

          <button
            type="submit"
            class="px-5 py-2 bg-red-600 text-white rounded-xl"
          >
            حفظ
          </button>

        </div>

      </form>

    </div>
  </div>
}
