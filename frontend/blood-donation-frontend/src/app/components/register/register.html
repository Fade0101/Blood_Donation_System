<div dir="rtl" class="min-h-screen bg-red-50/30 p-4 sm:p-6 lg:p-10">
  <div class="mx-auto grid min-h-[calc(100vh-2rem)] max-w-7xl overflow-hidden rounded-3xl border border-red-100 bg-white shadow-2xl lg:grid-cols-2">
    <section class="relative hidden lg:flex flex-col justify-center bg-gradient-to-br from-red-700 via-red-800 to-red-950 p-12 text-white">
      <img src="/new.jpg" alt="Blood Donation Logo" class="mb-8 h-24 w-auto rounded-2xl border border-white/25 bg-white/10 object-contain p-2 shadow-lg" />
      <h1 class="text-4xl font-extrabold leading-tight">معاً ننقذ حياة</h1>
      <p class="mt-4 max-w-md text-lg text-red-100">
        ابدأ رحلتك معنا وساهم في بناء مجتمع صحي من خلال نظام تبرع بالدم موثوق وسهل.
      </p>
      <img src="/dam.gif" alt="Animated Blood Icon" class="mt-10 h-14 w-14 rounded-full border border-white/30 bg-white/10 p-1" />
    </section>

    <section class="flex items-center justify-center bg-slate-50 px-5 py-10 sm:px-8">
      <div class="w-full max-w-xl rounded-3xl border border-red-100 bg-white p-6 shadow-xl sm:p-10">
        <div *ngIf="registrationSuccess()" class="text-center">
          <img src="/dam.gif" alt="Registration Success" class="mx-auto mb-5 h-16 w-16 rounded-full border border-red-200 bg-red-50 p-1" />
          <h2 class="text-2xl font-bold text-gray-900">تم إنشاء الحساب بنجاح</h2>
          <p class="mt-3 text-sm leading-7 text-gray-600">
            Registration successful! Waiting for admin approval.
          </p>
          <button
            (click)="navigateToLogin()"
            class="mt-7 w-full rounded-2xl bg-gradient-to-l from-red-600 to-red-900 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-red-900/30 transition hover:opacity-95 focus:outline-none focus:ring-4 focus:ring-red-200"
          >
            العودة إلى تسجيل الدخول
          </button>
        </div>

        <div *ngIf="!registrationSuccess()">
          <div class="mb-8 text-right">
            <img src="/new.jpg" alt="Blood Donation Logo" class="mb-5 h-16 w-auto rounded-xl border border-red-100 object-contain p-1 lg:hidden" />
            <h2 class="text-3xl font-bold text-gray-900">إنشاء حساب جديد</h2>
            <p class="mt-2 text-sm text-gray-600">أدخل بياناتك للانضمام إلى منظومة التبرع بالدم.</p>
          </div>

          <form class="space-y-5" (ngSubmit)="onRegister()">
            <div>
              <label for="email" class="mb-2 block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
              <div class="relative">
                <input
                  id="email"
                  name="email"
                  type="email"
                  [(ngModel)]="email"
                  class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 pl-11 text-right text-gray-900 placeholder:text-gray-400 focus:border-red-700 focus:outline-none focus:ring-4 focus:ring-red-100"
                  placeholder="example@email.com"
                  required
                />
                <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-red-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                  <path d="M3 7l9 6 9-6"></path>
                </svg>
              </div>
            </div>

            <div>
              <label for="password" class="mb-2 block text-sm font-medium text-gray-700">كلمة المرور</label>
              <div class="relative">
                <input
                  id="password"
                  name="password"
                  type="password"
                  [(ngModel)]="password"
                  class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 pl-11 text-right text-gray-900 placeholder:text-gray-400 focus:border-red-700 focus:outline-none focus:ring-4 focus:ring-red-100"
                  placeholder="********"
                  required
                />
                <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-red-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                  <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                </svg>
              </div>
            </div>

            <div>
              <label for="confirmPassword" class="mb-2 block text-sm font-medium text-gray-700">تأكيد كلمة المرور</label>
              <div class="relative">
                <input
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  [(ngModel)]="confirmPassword"
                  class="w-full rounded-2xl border border-gray-200 bg-white px-4 py-3 pl-11 text-right text-gray-900 placeholder:text-gray-400 focus:border-red-700 focus:outline-none focus:ring-4 focus:ring-red-100"
                  placeholder="********"
                  required
                />
                <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-red-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                  <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                  <path d="M12 14v2"></path>
                </svg>
              </div>
            </div>

            <button
              type="submit"
              [disabled]="isLoading()"
              class="flex w-full items-center justify-center rounded-2xl bg-gradient-to-l from-red-600 to-red-900 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-red-900/30 transition hover:opacity-95 focus:outline-none focus:ring-4 focus:ring-red-200 disabled:cursor-not-allowed disabled:opacity-60"
            >
              <img *ngIf="isLoading()" src="/dam.gif" alt="Loading" class="ml-2 h-5 w-5 rounded-full" />
              {{ isLoading() ? 'جاري إنشاء الحساب...' : 'إنشاء الحساب' }}
            </button>

            <p class="pt-2 text-center text-sm text-gray-600">
              لديك حساب بالفعل؟
              <button type="button" (click)="navigateToLogin()" class="font-semibold text-red-800 transition hover:text-red-900">
                تسجيل الدخول
              </button>
            </p>
          </form>
        </div>
      </div>
    </section>
  </div>
</div>
