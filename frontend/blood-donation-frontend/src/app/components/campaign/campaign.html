<div class="min-h-screen bg-gray-50 pt-28" dir="rtl">

  <!-- Container -->
  <div class="max-w-7xl mx-auto px-6">

    <!-- Header -->
    <div class="mb-10 text-center">
      <h1 class="text-3xl font-bold text-red-700 flex items-center justify-center gap-2">
        <i class="fa-solid fa-flag"></i>
        الحملات الطبية
      </h1>

      <p class="text-gray-500 mt-2">
        اختر رقم الحملة لعرض المتبرعين
      </p>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">

      @for (c of campaigns; track c) {

        <div
          class="bg-white rounded-2xl shadow-md border border-red-100 p-6 text-center cursor-pointer
                 hover:scale-110 hover:shadow-xl hover:bg-red-50 transition-all duration-300"
        >

          <!-- Campaign Number -->
          <div class="text-3xl font-bold text-red-700">
            {{ c }}
          </div>

          <p class="text-gray-500 text-sm mt-2">
            حملة تبرع
          </p>

        </div>

      }

    </div>

  </div>

</div>
