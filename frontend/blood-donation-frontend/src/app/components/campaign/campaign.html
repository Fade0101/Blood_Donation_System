<div class="min-h-screen bg-gray-50 pt-28 pb-12" dir="rtl">
  <div class="max-w-7xl mx-auto px-6 space-y-8">
    <!-- HEADER -->
    <div class="bg-white rounded-3xl shadow-xl border border-red-100 p-8">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-red-700 flex items-center gap-3">
            <i class="fa-solid fa-flag"></i> الحملات الطبية
          </h1>
          <p class="text-gray-500 mt-2 text-sm">إدارة وعرض جميع الحملات</p>
        </div>
        <!-- ADD BUTTON -->
        <button
          (click)="openModal()"
          class="bg-red-600 text-white px-5 py-2 rounded-xl hover:bg-red-700 transition flex items-center gap-2"
        >
          <i class="fa-solid fa-plus"></i> إضافة حملة
        </button>
      </div>
    </div>
    <!-- SEARCH -->
    <div class="bg-white rounded-3xl shadow-lg border border-red-100 p-5">
      <input
        type="text"
        placeholder="ابحث عن حملة..."
        (input)="onSearch($event)"
        class="w-full rounded-2xl border border-red-200 bg-gray-50 p-4"
      />
    </div>
    <!-- GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (c of filteredCampaigns(); track c.id) {
        <div
          class="group bg-white rounded-3xl border border-red-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 overflow-hidden cursor-pointer"
          (click)="openCampaign(c.id)"
        >
          <!-- TOP STRIPE -->
          <div class="h-2 bg-gradient-to-r from-red-500 via-red-600 to-red-700"></div>
          <div class="p-6 space-y-4">
            <!-- ICON + NUMBER -->
            <div class="flex items-center justify-between">
              <div
                class="relative w-14 h-14 rounded-2xl overflow-hidden shadow-md border border-red-100"
              >
                <img
                  src="/HabashyBblood.jpg"
                  class="w-full h-full object-cover group-hover:scale-110 transition duration-300"
                />
                <!-- overlay خفيف -->
                <div class="absolute inset-0 bg-red-500/10"></div>
              </div>
              <span class="text-xs px-3 py-1 rounded-full bg-red-100 text-red-700 font-semibold">
                Campaign
              </span>
            </div>
            <!-- CAMPAIGN NUMBER -->
            <div>
              <h2 class="text-3xl font-extrabold text-red-700 tracking-wide">
                #{{ c.campaignNumber }}
              </h2>
              <p class="text-gray-500 text-sm mt-1">حملة تبرع بالدم</p>
            </div>
            <!-- DETAILS -->
            <div class="space-y-2 text-sm text-gray-600">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-hospital text-red-400"></i> <span>{{ c.bloodBankName }}</span>
              </div>
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-user-doctor text-red-400"></i>
                <span>{{ c.supervisorName }}</span>
              </div>
            </div>
<!-- FOOTER -->
<div class="pt-3 border-t flex justify-between items-center">

  <!-- View -->
  <button
    (click)="openCampaign(c.id)"
    class="text-xs text-gray-500 hover:text-red-600 transition flex items-center gap-1"
  >
    View
    <i class="fa-solid fa-arrow-left text-xs"></i>
  </button>

  <!-- ACTIONS -->
  <div class="flex items-center gap-3">

    <!-- EDIT -->
    <button
      (click)="editCampaign(c); $event.stopPropagation()"
      class="text-blue-600 hover:text-blue-800 transition"
      title="Edit"
    >
      <i class="fa-solid fa-pen"></i>
    </button>

    <!-- DELETE -->
    <button
      (click)="deleteCampaign(c.id); $event.stopPropagation()"
      class="text-red-600 hover:text-red-800 transition"
      title="Delete"
    >
      <i class="fa-solid fa-trash"></i>
    </button>

  </div>

</div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
<!-- MODAL -->
@if (showModal()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
      <!-- HEADER -->
      <div class="bg-red-600 p-5 text-white flex justify-between">
        <h2 class="text-xl font-bold">إضافة حملة</h2>
        <button (click)="closeModal()">✕</button>
      </div>
      <!-- FORM -->
      <form [formGroup]="campaignForm" (ngSubmit)="submitCampaign()" class="p-6 space-y-4">
        <input
          formControlName="campaignNumber"
          type="number"
          placeholder="رقم الحملة"
          class="w-full p-3 border rounded-xl"
        />
        <input
          formControlName="bloodBankName"
          placeholder="اسم بنك الدم"
          class="w-full p-3 border rounded-xl"
        />
        <input
          formControlName="supervisorName"
          placeholder="المشرف"
          class="w-full p-3 border rounded-xl"
        />
        <div class="grid grid-cols-2 gap-3">
          <input type="date" formControlName="startDate" class="p-3 border rounded-xl" />
          <input type="date" formControlName="endDate" class="p-3 border rounded-xl" />
        </div>
        <div class="flex justify-end gap-3">
          <button type="button" (click)="closeModal()" class="px-4 py-2 bg-gray-200 rounded-xl">
            إلغاء
          </button>
          <button
            type="submit"
            class="px-5 py-2 bg-red-600 text-white rounded-xl"
            [disabled]="submitting()"
          >
            حفظ
          </button>
        </div>
      </form>
    </div>
  </div>
}
