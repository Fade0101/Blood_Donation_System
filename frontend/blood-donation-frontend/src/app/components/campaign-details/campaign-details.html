<div class="min-h-screen bg-gray-50 pt-28" dir="rtl">

  <div class="max-w-7xl mx-auto px-6">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-red-700">
        تفاصيل الحملة رقم {{ campaignId }}
      </h1>
    </div>

    <!-- Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- LEFT: Campaign Donors (SMALL) -->
      <div class="lg:col-span-1 bg-white rounded-2xl shadow-xl border border-red-100 overflow-hidden">

        <!-- Header -->
        <div class="p-4 bg-red-700 text-white font-bold">
          متبرعين الحملة
        </div>

        <!-- List -->
        <div class="max-h-[600px] overflow-auto">

          @for (d of campaignDonors; track d.id) {

            <div class="p-3 border-b hover:bg-red-50 flex items-center justify-between">

              <div>
                <p class="font-bold text-gray-700">{{ d.name }}</p>
              </div>

              <button
                class="bg-red-100 text-red-600 px-3 py-1 rounded-lg hover:bg-red-600 hover:text-white transition"
                (click)="removeFromCampaign(d)"
              >
                رجوع
              </button>

            </div>

          }

        </div>

      </div>

     <!-- RIGHT: ALL DONORS -->
<div class="lg:col-span-2 bg-white rounded-2xl shadow-xl border border-red-100 overflow-hidden">

  <!-- Header -->
  <div class="p-4 bg-red-700 text-white font-bold">
    كل المتبرعين
  </div>

  <!-- 🔥 SEARCH BAR (Improved UI) -->
  <div class="p-4 bg-gray-50 border-b">

    <div class="flex items-center gap-3">

      <!-- Input -->
      <div class="relative flex-1">

        <input
          type="text"
          placeholder="ابحث باسم المتبرع..."
          class="w-full pr-10 pl-4 py-3 rounded-xl border border-red-200 
                 focus:outline-none focus:ring-2 focus:ring-red-500
                 shadow-sm transition"
        />

        <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-red-400"></i>

      </div>

      <!-- Button -->
      <button
        class="bg-red-700 text-white px-6 py-3 rounded-xl 
               hover:bg-red-800 hover:scale-105 transition shadow-md"
      >
        بحث
      </button>

    </div>

  </div>

  <!-- TABLE -->
  <div class="overflow-auto max-h-[700px]">

    <table class="w-full text-sm text-right">

      <thead class="bg-gray-100 text-gray-700">
        <tr>
          <th class="p-3">اختيار</th>
          <th class="p-3">الاسم</th>
          <th class="p-3">الفصيلة</th>
          <th class="p-3">الموبايل</th>
          <th class="p-3">العنوان</th>
          <th class="p-3">الكنيسة</th>
        </tr>
      </thead>

      <tbody>

        @for (d of allDonors; track d.id) {

          <tr class="border-b hover:bg-red-50 transition">

            <td class="p-3">
              <input type="checkbox" />
            </td>

            <td class="p-3 font-semibold text-gray-700">
              {{ d.name }}
            </td>

            <td class="p-3 text-gray-600">
              {{ d.bloodType }}
            </td>

            <td class="p-3 text-gray-600">
              {{ d.phone }}
            </td>

            <td class="p-3 text-gray-600">
              {{ d.address }}
            </td>

            <td class="p-3 text-gray-600">
              {{ d.church }}
            </td>

          </tr>

        }

      </tbody>

    </table>

  </div>

  <!-- ACTIONS -->
  <div class="p-4 flex justify-end border-t">

    <button
      class="bg-red-700 text-white px-5 py-2 rounded-xl 
             hover:scale-105 transition"
      (click)="addToCampaign()"
    >
      ➜ إضافة للحملة
    </button>

  </div>

</div>

    </div>

  </div>

</div>
