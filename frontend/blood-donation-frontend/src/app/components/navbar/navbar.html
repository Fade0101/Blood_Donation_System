<nav class="backdrop-blur-md bg-red-900/80 text-white shadow-lg fixed w-full z-50">

  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">

      <!-- LOGO -->
      <div class="flex items-center gap-3 cursor-pointer hover:scale-105 transition group">

        <div class="w-11 h-11 rounded-2xl overflow-hidden shadow-lg border border-white/20
                    group-hover:scale-110 transition duration-300">

          <img
            src="/HabashyBblood.jpg"
            alt="Habashy Blood"
            class="w-full h-full object-cover"
          />

        </div>

        <span class="font-bold text-xl tracking-wide group-hover:text-red-200 transition">
          تبرع دم حبشي
        </span>

      </div>

      <!-- MENU -->
      <div class="hidden md:flex items-center gap-8 text-sm">

        <!-- HOME -->
        <a *ngIf="authService.isAuthenticated()" routerLink="/home"
           class="relative flex items-center gap-2 hover:text-red-200 transition group">

          <i class="fa-solid fa-house"></i>
          الرئيسية

          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-red-300 rounded-full
                   transition-all duration-300 group-hover:w-full">
          </span>

        </a>

        <!-- DONORS -->
        <a *ngIf="authService.isAuthenticated()" routerLink="/donors"
           class="relative flex items-center gap-2 hover:text-red-200 transition group">

          <i class="fa-solid fa-users"></i>
          المتبرعين

          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-red-300 rounded-full
                   transition-all duration-300 group-hover:w-full">
          </span>

        </a>

        <!-- CAMPAIGNS -->
        <a *ngIf="authService.isAuthenticated()" routerLink="/campaigns"
           class="relative flex items-center gap-2 hover:text-red-200 transition group">

          <i class="fa-solid fa-bullhorn"></i>
          الحملات

          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-red-300 rounded-full
                   transition-all duration-300 group-hover:w-full">
          </span>

        </a>

        <!-- ADMIN DASHBOARD -->
        <a *ngIf="authService.isAdmin()" routerLink="/admin"
           class="relative flex items-center gap-2 hover:text-red-200 transition group">

          <i class="fa-solid fa-shield"></i>
          لوحة التحكم

          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-red-300 rounded-full
                   transition-all duration-300 group-hover:w-full">
          </span>

        </a>

        <!-- STATS -->
        <a *ngIf="authService.isAuthenticated()" class="relative flex items-center gap-2 hover:text-red-200 transition group">

          <i class="fa-solid fa-chart-line"></i>
          الإحصائيات

          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-red-300 rounded-full
                   transition-all duration-300 group-hover:w-full">
          </span>

        </a>

      </div>

      <!-- ACTIONS -->
      <div class="flex items-center gap-4">

        <button *ngIf="authService.isAuthenticated()"
          class="bg-white text-red-700 px-4 py-1.5 rounded-xl font-semibold
                 hover:bg-gray-200 transition hover:scale-105 flex items-center gap-2 shadow-md">

          <i class="fa-solid fa-plus"></i>
          حملة جديدة

        </button>

        <!-- USER MENU -->
        <div *ngIf="authService.isAuthenticated()" class="flex items-center gap-3">
          <span class="text-sm">{{ authService.currentUser()?.email }}</span>
          <button
            (click)="logout()"
            class="bg-red-700 text-white px-3 py-1.5 rounded-lg text-sm font-semibold
                   hover:bg-red-800 transition flex items-center gap-2">
            <i class="fa-solid fa-sign-out-alt"></i>
            تسجيل الخروج
          </button>
        </div>

        <!-- LOGIN/REGISTER -->
        <div *ngIf="!authService.isAuthenticated()" class="flex items-center gap-2">
          <a routerLink="/login"
             class="bg-white text-red-700 px-3 py-1.5 rounded-lg text-sm font-semibold
                    hover:bg-gray-200 transition">
            دخول
          </a>
          <a routerLink="/register"
             class="bg-red-700 text-white px-3 py-1.5 rounded-lg text-sm font-semibold
                    hover:bg-red-800 transition">
            تسجيل
          </a>
        </div>

        <!-- MOBILE -->
        <button class="md:hidden text-xl">
          <i class="fa-solid fa-bars"></i>
        </button>

      </div>

    </div>
