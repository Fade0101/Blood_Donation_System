<div dir="rtl" class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="mx-auto flex w-full max-w-5xl overflow-hidden rounded-2xl border border-red-100 bg-white shadow-xl lg:grid lg:grid-cols-2">

    <section class="relative hidden lg:flex flex-col justify-center bg-gradient-to-br from-red-700 via-red-800 to-red-950 p-8 text-white">
      <img src="/new.jpg" alt="Logo" class="mb-6 h-16 w-auto self-start rounded-xl border border-white/20 bg-white/10 object-contain p-1.5 shadow-md" />
      <h1 class="text-2xl font-bold leading-tight">معاً ننقذ حياة</h1>
      <p class="mt-3 max-w-xs text-sm text-red-100/80 leading-relaxed">
        منصة تبرع بالدم بتجربة حديثة وآمنة لربط المتبرعين بالحملات بسرعة ووضوح.
      </p>
      <img src="/dam.gif" alt="Icon" class="mt-8 h-10 w-10 rounded-full border border-white/30 bg-white/10 p-0.5" />
    </section>

    <section class="flex items-center justify-center bg-white px-6 py-10 sm:px-12">
      <div class="w-full max-w-sm">
        <div class="mb-6 text-right">
          <img src="/new.jpg" alt="Logo" class="mb-4 h-12 w-auto rounded-lg border border-red-50 object-contain p-1 lg:hidden" />
          <h2 class="text-xl font-bold text-gray-900">تسجيل الدخول</h2>
          <p class="mt-1 text-xs text-gray-500">أدخل بياناتك للوصول إلى حسابك الإداري.</p>
        </div>

        <form class="space-y-4" (ngSubmit)="onLogin()">
          <div>
            <label for="email" class="mb-1.5 block text-xs font-semibold text-gray-600">البريد الإلكتروني</label>
            <div class="relative">
              <input
                id="email"
                name="email"
                type="email"
                [(ngModel)]="email"
                class="w-full rounded-xl border border-gray-200 bg-gray-50/50 px-4 py-2.5 pl-10 text-right text-sm text-gray-900 placeholder:text-gray-400 focus:border-red-600 focus:bg-white focus:outline-none focus:ring-4 focus:ring-red-100 transition-all"
                placeholder="example@email.com"
                required
              />
              <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-red-700/70" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 7l9 6 9-6M3 5h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"></path>
              </svg>
            </div>
          </div>

          <div>
            <label for="password" class="mb-1.5 block text-xs font-semibold text-gray-600">كلمة المرور</label>
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                [(ngModel)]="password"
                class="w-full rounded-xl border border-gray-200 bg-gray-50/50 px-4 py-2.5 pl-10 text-right text-sm text-gray-900 placeholder:text-gray-400 focus:border-red-600 focus:bg-white focus:outline-none focus:ring-4 focus:ring-red-100 transition-all"
                placeholder="********"
                required
              />
              <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-red-700/70" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
              </svg>
            </div>
          </div>

          <button
            type="submit"
            [disabled]="isLoading()"
            class="flex w-full items-center justify-center rounded-xl bg-gradient-to-l from-red-700 to-red-800 px-5 py-2.5 text-sm font-bold text-white shadow-md shadow-red-900/20 transition-all hover:shadow-lg active:scale-95 disabled:opacity-50"
          >
            <img *ngIf="isLoading()" src="/dam.gif" alt="Loading" class="ml-2 h-4 w-4 rounded-full" />
            {{ isLoading() ? 'جاري التحقق...' : 'دخول للوحة التحكم' }}
          </button>

          <p class="pt-2 text-center text-xs text-gray-500">
            ليس لديك حساب؟
            <button type="button" (click)="navigateToRegister()" class="font-bold text-red-700 hover:underline">
              تقديم طلب انضمام
            </button>
          </p>
        </form>
      </div>
    </section>
  </div>
</div>
